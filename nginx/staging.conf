server {
    listen 80;
    server_name staging.hdb-devops.fr staging-grafana.hdb-devops.fr staging-prometheus.hdb-devops.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging.hdb-devops.fr;

    ssl_certificate /etc/letsencrypt/live/staging.hdb-devops.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.hdb-devops.fr/privkey.pem;

    root /var/www/staging;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name staging-grafana.hdb-devops.fr;

    ssl_certificate /etc/letsencrypt/live/staging.hdb-devops.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.hdb-devops.fr/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    server_name staging-prometheus.hdb-devops.fr;

    ssl_certificate /etc/letsencrypt/live/staging.hdb-devops.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.hdb-devops.fr/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}