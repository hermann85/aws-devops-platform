server {
    listen 80;
    server_name hdb-devops.fr www.hdb-devops.fr grafana.hdb-devops.fr prometheus.hdb-devops.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hdb-devops.fr www.hdb-devops.fr;

    ssl_certificate /etc/letsencrypt/live/hdb-devops.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hdb-devops.fr/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl http2;
    server_name grafana.hdb-devops.fr;

    ssl_certificate /etc/letsencrypt/live/hdb-devops.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hdb-devops.fr/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    server_name prometheus.hdb-devops.fr;

    ssl_certificate /etc/letsencrypt/live/hdb-devops.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hdb-devops.fr/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}