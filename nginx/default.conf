server {
    listen 80;
    server_name hdb-devops.fr www.hdb-devops.fr grafana.hdb-devops.fr prometheus.hdb-devops.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hdb-devops.fr www.hdb-devops.fr;

    ssl_certificate /etc/letsencrypt/live/hdb-devops.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hdb-devops.fr/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name grafana.hdb-devops.fr;

    ssl_certificate /etc/letsencrypt/live/hdb-devops.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hdb-devops.fr/privkey.pem;

    location / {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    server_name prometheus.hdb-devops.fr;

    ssl_certificate /etc/letsencrypt/live/hdb-devops.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hdb-devops.fr/privkey.pem;

    location / {
        proxy_pass http://prometheus:9090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
